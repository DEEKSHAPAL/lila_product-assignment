<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="LILA BLACK Player Journey Visualizer for gameplay telemetry analysis."
    />
    <title>LILA BLACK Player Journey Visualizer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111722;
        --text: #f8fafc;
        --muted: #c3d5ff;
        --line: rgba(255, 255, 255, 0.16);
        --blue: #46a3ff;
        --green: #73d13d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(1180px, calc(100% - 48px));
        min-height: 100vh;
        margin: 0 auto;
        display: flex;
        align-items: center;
        padding: 48px 0;
      }

      .hero {
        max-width: 960px;
      }

      .eyebrow {
        margin: 0 0 22px;
        color: var(--green);
        font-size: 0.92rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 920px;
        font-size: clamp(3rem, 7vw, 5.45rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .lead {
        margin: 38px 0 0;
        max-width: 1020px;
        color: var(--muted);
        font-size: clamp(1.15rem, 2vw, 1.45rem);
        line-height: 1.45;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        margin-top: 44px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 66px;
        padding: 0 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        text-decoration: none;
        font-size: 1.08rem;
        font-weight: 800;
      }

      .button.primary {
        border-color: rgba(70, 163, 255, 0.78);
        background: rgba(70, 163, 255, 0.2);
      }

      .button:focus-visible {
        outline: 3px solid rgba(70, 163, 255, 0.8);
        outline-offset: 3px;
      }

      @media (max-width: 680px) {
        main {
          width: min(100% - 28px, 1180px);
          align-items: flex-start;
          padding-top: 44px;
        }

        h1 {
          font-size: clamp(2.5rem, 13vw, 4rem);
        }

        .lead {
          margin-top: 28px;
        }

        .actions {
          gap: 12px;
          margin-top: 32px;
        }

        .button {
          width: 100%;
          min-height: 58px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">LILA APM Written Test</p>
        <h1 id="page-title">LILA BLACK Player Journey Visualizer</h1>
        <p class="lead">
          A Streamlit-based telemetry tool for exploring player and bot routes,
          combat hotspots, death locations, storm deaths, loot pickups, and
          match flow across production gameplay data.
        </p>
        <div class="actions">
          <a
            class="button primary"
            href="https://github.com/DEEKSHAPAL/lila_product-assignment"
          >
            GitHub Repository
          </a>
          <a
            class="button"
            href="https://lilaappuct-assignment-nc4g2rh8ul5vwyskhnexjc.streamlit.app/"
          >
            Open Interactive Dashboard
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
